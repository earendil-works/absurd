# Zensical configuration
#
# Docs: https://zensical.org/docs/get-started/

[project]
site_name = "Absurd"
docs_dir = "docs"
site_dir = "site"
site_url = "https://earendil-works.github.io/absurd/"
site_description = "Absurd is a Postgres-native durable workflow system built around durable execution in PostgreSQL."

extra_css = [
    "stylesheets/commit-mono.css",
    "stylesheets/extra.css",
]

extra_javascript = [
    "javascripts/home-link.js",
]

repo_url = "https://github.com/earendil-works/absurd"
edit_uri = "edit/main/docs"

copyright = "<a href=\"https://earendil.com/\">Earendil Inc.</a>"

nav = [
    {"Home" = "index.md"},

    {"Guide" = [
        {"Quickstart" = "quickstart.md"},
        {"Concepts" = "concepts.md"},
        {"Database Setup and Migrations" = "database.md"},
        {"Cleanup and Retention" = "cleanup.md"},
        {"Working with Agents" = "agents.md"},
        {"Comparison" = "comparison.md"},
    ]},

    {"SDKs" = [
        {"Overview" = "sdks/index.md"},
        {"TypeScript" = "sdks/typescript.md"},
        {"Python" = "sdks/python.md"},
        {"Go" = "sdks/go.md"},
    ]},

    {"Patterns" = [
        {"Overview" = "patterns/index.md"},
        {"Cron Jobs" = "patterns/cron.md"},
        {"Living with Code Changes" = "patterns/living-with-code-changes.md"},
        {"Pi AI Agent" = "patterns/pi-ai-agent.md"},
    ]},

    {"Tools" = [
        {"Overview" = "tools/index.md"},
        {"absurdctl" = "tools/absurdctl.md"},
        {"Habitat" = "tools/habitat.md"},
    ]},
]

[project.theme]
font = false
custom_dir = "docs/overrides"
favicon = "assets/favicon-128.png"
logo = "assets/favicon-128.png"
features = [
    "content.action.view",
    "content.action.edit",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "toc.follow",
]

[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.theme.icon]
logo = "material/cube-outline"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "grey"
accent = "grey"
toggle = { icon = "material/weather-night", name = "Switch to dark mode" }

[[project.theme.palette]]
scheme = "slate"
primary = "grey"
accent = "grey"
toggle = { icon = "material/weather-sunny", name = "Switch to light mode" }
